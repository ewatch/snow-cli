name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - docs/site/**
      - .github/workflows/pages.yml
      # The docs read the displayed version from Cargo.toml at build time, so a
      # version bump must redeploy the site even when no docs/site file changed.
      - Cargo.toml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Build documentation
        working-directory: docs/site
        env:
          # Project site is served at https://ewatch.github.io/snow-cli/, so the
          # build must emit assets and links under that base (see astro.config.mjs).
          BASE_PATH: /snow-cli/
        run: |
          npm ci
          npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site/dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
