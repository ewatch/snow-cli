name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.3.1"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_DIST_VERSION: "0.28.0"
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}

jobs:
  build-archives:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Verify both binaries build
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          cargo build --release --locked --target "${TARGET}" --bins

          suffix=""
          if [[ "${TARGET}" == *"windows"* ]]; then
            suffix=".exe"
          fi

          for bin in snow-cli snow-cli-ro; do
            path="target/${TARGET}/release/${bin}${suffix}"
            if [[ ! -f "${path}" ]]; then
              echo "Expected binary not found: ${path}" >&2
              exit 1
            fi
            echo "Built ${path}"
          done

      - name: Install cargo-dist
        shell: bash
        run: cargo install cargo-dist --version "${CARGO_DIST_VERSION}" --locked

      - name: Build release archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: dist build --artifacts=local --target "${TARGET}" --tag "${RELEASE_TAG}"

      - name: Verify release archives include both binaries
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          if command -v python3 >/dev/null 2>&1; then
            PYTHON=python3
          else
            PYTHON=python
          fi

          "${PYTHON}" - <<'PY'
          import pathlib
          import sys
          import tarfile
          import zipfile

          archives = sorted(
              list(pathlib.Path("target/distrib").glob("*.tar.xz"))
              + list(pathlib.Path("target/distrib").glob("*.zip"))
          )
          if not archives:
              print("No release archives found in target/distrib", file=sys.stderr)
              sys.exit(1)

          found = set()
          for archive in archives:
              if archive.suffix == ".zip":
                  with zipfile.ZipFile(archive) as zf:
                      names = zf.namelist()
              else:
                  with tarfile.open(archive, "r:*") as tf:
                      names = tf.getnames()

              basenames = {pathlib.PurePosixPath(name).name for name in names}
              if "snow-cli" in basenames or "snow-cli.exe" in basenames:
                  found.add("snow-cli")
              if "snow-cli-ro" in basenames or "snow-cli-ro.exe" in basenames:
                  found.add("snow-cli-ro")

          missing = {"snow-cli", "snow-cli-ro"} - found
          if missing:
              print(
                  "Missing expected binaries from release archives: "
                  + ", ".join(sorted(missing)),
                  file=sys.stderr,
              )
              print("Archives inspected:", file=sys.stderr)
              for archive in archives:
                  print(f"  {archive}", file=sys.stderr)
              sys.exit(1)

          print("Verified release archives include snow-cli and snow-cli-ro")
          PY

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.target }}
          path: target/distrib/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build-archives
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Curate release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets
          mapfile -t files < <(
            find dist -maxdepth 1 -type f \
              \( -name 'snow-cli-*.tar.xz' -o -name 'snow-cli-*.zip' \) \
              -printf '%f\n' | sort
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No archive release assets found in dist/." >&2
            exit 1
          fi

          for file in "${files[@]}"; do
            cp "dist/${file}" "release-assets/${file}"
          done

          (
            cd release-assets
            sha256sum "${files[@]}" > SHA256SUMS
          )

      - name: Build release notes from changelog
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          awk -v version="${version}" '
            $0 == "## [" version "]" || index($0, "## [" version "] - ") == 1 {
              in_release = 1
              print
              next
            }
            in_release && /^## \[/ {
              exit
            }
            in_release {
              print
            }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            {
              echo "## ${RELEASE_TAG}"
              echo
              echo "See CHANGELOG.md for release details."
            } > release-notes.md
          fi

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print | sort

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release-assets/*
          body_path: release-notes.md
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
