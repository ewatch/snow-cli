name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.3.1"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-archives:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Verify Cargo.toml version matches the release tag
        shell: bash
        run: |
          set -euo pipefail

          tag_version="${RELEASE_TAG#v}"
          pkg_version="$(grep -m1 '^version' Cargo.toml | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')"

          if [[ "${pkg_version}" != "${tag_version}" ]]; then
            echo "::error::Cargo.toml version (${pkg_version}) does not match release tag (${tag_version}). Bump the version in Cargo.toml (and CHANGELOG.md) before tagging." >&2
            exit 1
          fi
          echo "Version ${pkg_version} matches tag ${RELEASE_TAG}."

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binaries
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          # Linux targets build through `cross` (Docker) so the libdbus-1
          # dependency pulled in by keyring is provided for the target arch
          # (see Cross.toml); macOS and Windows build natively with cargo.
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --locked --target "${TARGET}" --bins
          else
            cargo build --release --locked --target "${TARGET}" --bins
          fi

          suffix=""
          if [[ "${TARGET}" == *"windows"* ]]; then
            suffix=".exe"
          fi

          for bin in snow-cli snow-cli-ro; do
            path="target/${TARGET}/release/${bin}${suffix}"
            if [[ ! -f "${path}" ]]; then
              echo "Expected binary not found: ${path}" >&2
              exit 1
            fi
            echo "Built ${path}"
          done

      - name: Package release archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          bindir="target/${TARGET}/release"
          out="${GITHUB_WORKSPACE}/dist"
          staging="$(mktemp -d)"
          mkdir -p "${out}"

          # Versioned archive names are the contract relied on by
          # scripts/install.sh, scripts/install.ps1, and the Homebrew tap:
          # snow-cli-<version>-<target>.<ext>, with both binaries at the root.
          if [[ "${TARGET}" == *"windows"* ]]; then
            cp "${bindir}/snow-cli.exe" "${bindir}/snow-cli-ro.exe" LICENSE "${staging}/"
            archive="snow-cli-${version}-${TARGET}.zip"
            ( cd "${staging}" && 7z a -tzip "${out}/${archive}" snow-cli.exe snow-cli-ro.exe LICENSE >/dev/null )
          else
            cp "${bindir}/snow-cli" "${bindir}/snow-cli-ro" LICENSE "${staging}/"
            archive="snow-cli-${version}-${TARGET}.tar.xz"
            tar -cJf "${out}/${archive}" -C "${staging}" snow-cli snow-cli-ro LICENSE
          fi

          echo "Packaged ${out}/${archive}"

      - name: Verify release archives include both binaries
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          if command -v python3 >/dev/null 2>&1; then
            PYTHON=python3
          else
            PYTHON=python
          fi

          "${PYTHON}" - <<'PY'
          import pathlib
          import sys
          import tarfile
          import zipfile

          archives = sorted(
              list(pathlib.Path("dist").glob("*.tar.xz"))
              + list(pathlib.Path("dist").glob("*.zip"))
          )
          if not archives:
              print("No release archives found in dist", file=sys.stderr)
              sys.exit(1)

          found = set()
          for archive in archives:
              if archive.suffix == ".zip":
                  with zipfile.ZipFile(archive) as zf:
                      names = zf.namelist()
              else:
                  with tarfile.open(archive, "r:*") as tf:
                      names = tf.getnames()

              basenames = {pathlib.PurePosixPath(name).name for name in names}
              if "snow-cli" in basenames or "snow-cli.exe" in basenames:
                  found.add("snow-cli")
              if "snow-cli-ro" in basenames or "snow-cli-ro.exe" in basenames:
                  found.add("snow-cli-ro")

          missing = {"snow-cli", "snow-cli-ro"} - found
          if missing:
              print(
                  "Missing expected binaries from release archives: "
                  + ", ".join(sorted(missing)),
                  file=sys.stderr,
              )
              print("Archives inspected:", file=sys.stderr)
              for archive in archives:
                  print(f"  {archive}", file=sys.stderr)
              sys.exit(1)

          print("Verified release archives include snow-cli and snow-cli-ro")
          PY

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build-archives
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Curate release assets
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          mkdir -p release-assets
          mapfile -t files < <(
            find dist -maxdepth 1 -type f \
              \( -name 'snow-cli-*.tar.xz' -o -name 'snow-cli-*.zip' \) \
              -printf '%f\n' | sort
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No archive release assets found in dist/." >&2
            exit 1
          fi

          # Archives are produced with versioned names at build time
          # (snow-cli-<version>-<target>.<ext>). Assert that contract here so a
          # naming regression fails loudly instead of shipping assets the
          # installers and Homebrew tap cannot find.
          for file in "${files[@]}"; do
            if [[ "${file}" != "snow-cli-${version}-"* ]]; then
              echo "::error::release asset '${file}' is not named snow-cli-${version}-<target>.<ext>" >&2
              exit 1
            fi
            cp "dist/${file}" "release-assets/${file}"
          done

          (
            cd release-assets
            sha256sum "${files[@]}" > SHA256SUMS
          )

      - name: Build release notes from changelog
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          awk -v version="${version}" '
            $0 == "## [" version "]" || index($0, "## [" version "] - ") == 1 {
              in_release = 1
              print
              next
            }
            in_release && /^## \[/ {
              exit
            }
            in_release {
              print
            }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            {
              echo "## ${RELEASE_TAG}"
              echo
              echo "See CHANGELOG.md for release details."
            } > release-notes.md
          fi

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print | sort

      # Attach assets to a DRAFT release first. This repo has immutable
      # releases enabled, so a release can only receive assets while it is
      # still a draft; uploading to an already-published release is rejected.
      - name: Upload assets to draft GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          files: release-assets/*
          body_path: release-notes.md
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true

      # All assets are attached; publish the draft and mark it latest. After
      # this the release is immutable, which is fine because nothing else is
      # uploaded afterwards.
      - name: Publish the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release edit "${RELEASE_TAG}" --draft=false --latest

  notify-homebrew-tap:
    name: Trigger Homebrew tap update
    runs-on: ubuntu-latest
    needs:
      - publish
    steps:
      - name: Dispatch new-release event to ewatch/homebrew-tap
        shell: bash
        env:
          # PAT with `contents: write` on ewatch/homebrew-tap.
          # Stored as a repo secret named HOMEBREW_TAP_TOKEN.
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping tap dispatch." >&2
            echo "The tap will still update via its daily cron in update-formula.yml." >&2
            exit 0
          fi

          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TAP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ewatch/homebrew-tap/dispatches \
            -d '{"event_type":"new-release"}'

          echo "Dispatched new-release to ewatch/homebrew-tap."
