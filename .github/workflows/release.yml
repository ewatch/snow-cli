name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_DIST_VERSION: "0.28.0"
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}

jobs:
  build-archives:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-dist
        shell: bash
        run: cargo install cargo-dist --version "${CARGO_DIST_VERSION}" --locked

      - name: Build release archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: dist build --artifacts=local --target "${TARGET}" --tag "${RELEASE_TAG}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: target/distrib/*
          if-no-files-found: error

  build-installers:
    name: Build installers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-dist
        run: cargo install cargo-dist --version "${CARGO_DIST_VERSION}" --locked

      - name: Build shell and PowerShell installers
        run: dist build --artifacts=global --tag "${RELEASE_TAG}"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-installers
          path: target/distrib/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build-archives
      - build-installers
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build release notes from changelog
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          awk -v version="${version}" '
            $0 == "## [" version "]" || index($0, "## [" version "] - ") == 1 {
              in_release = 1
              print
              next
            }
            in_release && /^## \[/ {
              exit
            }
            in_release {
              print
            }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            {
              echo "## ${RELEASE_TAG}"
              echo
              echo "See CHANGELOG.md for release details."
            } > release-notes.md
          fi

      - name: List release assets
        run: find dist -maxdepth 1 -type f -print | sort

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          body_path: release-notes.md
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
