<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">snow-cli</title>
  <desc id="description">ServiceNow CLI for coding agents</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08100d"/>
      <stop offset="1" stop-color="#10251b"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#9ee493" stroke-opacity=".06"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="600" cy="315" r="260" fill="#79d5d0" fill-opacity=".07"/>
  <g transform="translate(366 224)">
    <rect x="0" y="0" width="112" height="112" rx="22" fill="#193522" stroke="#9ee493" stroke-width="3"/>
    <text x="56" y="74" text-anchor="middle" fill="#9ee493" font-family="Menlo" font-size="44" font-weight="700">&gt;_</text>
    <text x="136" y="72" fill="#edf6f0" font-family="Menlo" font-size="76" font-weight="700" letter-spacing="-4">snow-cli</text>
  </g>
  <g filter="url(#glow)">
    <path d="M467 393H733" stroke="#9ee493" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="600" y="447" text-anchor="middle" fill="#a6b8ad" font-family="Avenir Next" font-size="27" letter-spacing="1.5">SERVICENOW CLI FOR CODING AGENTS</text>
</svg>
