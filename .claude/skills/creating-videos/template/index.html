<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand.css">
</head>
<body>

<div class="viewport">
  <div class="stage" id="stage">
    <div class="caption-bar" id="captionBar"></div>
  </div>
</div>

<div class="controls" id="controls">
  <button id="btnPlay">▶ play</button>
  <button id="btnRestart">⟲</button>
  <button id="btnPrev">⏮ scene</button>
  <button id="btnNext">scene ⏭</button>
  <input class="scrub" id="scrub" type="range" min="0" max="100" step="0.01" value="0">
  <span class="scene-name" id="sceneName">—</span>
  <span class="time" id="time">0.0 / 0.0</span>
</div>

<!-- engine -->
<script src="engine.js"></script>

<!-- scenes: registration order = play order. Add one <script> per scene file. -->
<script src="scenes/example-scene.js"></script>
<!-- <script src="scenes/02-your-scene.js"></script> -->

<!-- boot -->
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const still = params.get('still') === '1';
  const showHud = params.get('hud') !== '0' && !still;

  const stage = document.getElementById('stage');
  const captionBar = document.getElementById('captionBar');
  const controls = document.getElementById('controls');
  const scrub = document.getElementById('scrub');
  const timeEl = document.getElementById('time');
  const sceneName = document.getElementById('sceneName');
  const btnPlay = document.getElementById('btnPlay');

  if (!showHud) controls.classList.add('hidden');

  const player = new Nori.Player({
    viewport: document.querySelector('.viewport'),
    stage, captionBar,
    onTick: (t, i, local) => {
      if (!scrub.__drag) scrub.value = t;
      timeEl.textContent = t.toFixed(1) + ' / ' + player.total.toFixed(1);
      sceneName.textContent = (i + 1) + '. ' + player.scenes[i].title;
      btnPlay.textContent = player.playing ? '⏸ pause' : '▶ play';
    },
  });
  window.__player = player;

  scrub.max = player.total;
  scrub.addEventListener('input', () => { player.pause(); player.seekGlobal(+scrub.value); });
  scrub.addEventListener('pointerdown', () => scrub.__drag = true);
  scrub.addEventListener('pointerup', () => scrub.__drag = false);

  document.getElementById('btnPlay').onclick = () => player.toggle();
  document.getElementById('btnRestart').onclick = () => { player.restart(); };
  document.getElementById('btnPrev').onclick = () => player.prevScene();
  document.getElementById('btnNext').onclick = () => player.nextScene();

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); player.toggle(); }
    else if (e.code === 'ArrowRight') player.nextScene();
    else if (e.code === 'ArrowLeft') player.prevScene();
    else if (e.key === 'r' || e.key === 'R') player.restart();
    else if (e.code === 'Period') { player.pause(); player.seekGlobal(player.t + 1 / 30); }
    else if (e.code === 'Comma') { player.pause(); player.seekGlobal(player.t - 1 / 30); }
  });

  let started = false;
  function start() {
    if (started) return; started = true;
    let g = 0;
    if (params.has('scene')) {
      const si = Math.max(0, Math.min(+params.get('scene'), player.scenes.length - 1));
      g = player.sceneStart(si) + (params.has('t') ? +params.get('t') : 0);
    } else if (params.has('t')) {
      g = +params.get('t');
    }
    player.seekGlobal(g);
    if (!still && params.get('play') === '1') player.play();
    window.__ready = true;
    document.body.setAttribute('data-ready', '1');
  }

  // wait for fonts so text metrics are right, with a safety fallback
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(start);
    setTimeout(start, 1500);
  } else {
    start();
  }
})();
</script>
</body>
</html>
