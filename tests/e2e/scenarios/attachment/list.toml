name = "attachment-list"
description = "List attachments on a record (attachment: list leg)"
requires = ["credentials"]

[[setup]]
description = "Create the scenario profile"
args = ["profile", "add", "e2e-scenario", "--instance", "$SNOW_E2E_INSTANCE_URL", "--auth-method", "basic", "--username", "$SNOW_E2E_USERNAME"]

[[setup]]
description = "Store credentials for the scenario profile"
shell = "printf '%s' \"$SNOW_E2E_PASSWORD\" | \"$SNOW_CLI_BIN\" auth login --profile e2e-scenario --password-stdin"

[[setup]]
description = "Create a throwaway record to attach to"
args = ["table", "create", "incident", "--profile", "e2e-scenario", "--output", "json", "--data", "{\"short_description\":\"snow-cli e2e scenario: attachment-list\"}"]
capture = { sys_id = ".sys_id" }

[[setup]]
description = "Create a small PNG fixture and upload it so the list is non-empty"
shell = "f=$(mktemp \"${TMPDIR:-/tmp}/snow-cli-e2e-attach.XXXXXX\"); mv \"$f\" \"$f.png\"; f=\"$f.png\"; python3 -c 'import base64, sys; sys.stdout.buffer.write(base64.b64decode(\"iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVQIHWP4z8DwHwAFgAI/ScL0cwAAAABJRU5ErkJggg==\"))' > \"$f\"; \"$SNOW_CLI_BIN\" attachment upload incident \"{{sys_id}}\" --file \"$f\" --profile e2e-scenario --output json >/dev/null; printf '%s' \"$f\""
capture = { file_path = "raw" }

[command]
args = ["attachment", "list", "incident", "{{sys_id}}", "--profile", "e2e-scenario", "--output", "json"]

[expect]
exit_code = 0

[[fuzzy]]
expectation = "The listing is a JSON array with at least one attachment whose table is incident and whose table_sys_id matches the record we created."

[[cleanup]]
description = "Delete the record (cascades to its attachments)"
args = ["table", "delete", "incident", "{{sys_id}}", "--profile", "e2e-scenario", "--yes"]
allow_failure = true

[[cleanup]]
description = "Remove the local fixture file"
shell = "rm -f \"{{file_path}}\""
allow_failure = true

[[cleanup]]
description = "Remove the scenario profile"
args = ["profile", "remove", "e2e-scenario", "--yes"]
allow_failure = true
