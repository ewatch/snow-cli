name = "snu-attachment-upload"
description = "Upload an attachment through the active SN-Utils browser session"
requires = ["sn-utils-bridge", "credentials"]

[[setup]]
description = "Create the scenario profile (instance context; bridge provides the session)"
args = ["profile", "add", "e2e-scenario", "--instance", "$SNOW_E2E_INSTANCE_URL", "--auth-method", "basic", "--username", "$SNOW_E2E_USERNAME"]

[[setup]]
description = "Create a record to attach to via the browser session"
args = ["snu", "create-record", "incident", "--data", "{\"short_description\":\"snow-cli e2e scenario: snu-attachment-upload\"}", "--profile", "e2e-scenario", "--output", "json"]
capture = { sys_id = ".sys_id" }

[[setup]]
description = "Create a small PNG fixture file to upload"
shell = "f=$(mktemp \"${TMPDIR:-/tmp}/snow-cli-e2e-attach.XXXXXX\") && mv \"$f\" \"$f.png\" && f=\"$f.png\" && python3 -c 'import base64, sys; sys.stdout.buffer.write(base64.b64decode(\"iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVQIHWP4z8DwHwAFgAI/ScL0cwAAAABJRU5ErkJggg==\"))' > \"$f\" && printf '%s' \"$f\""
capture = { file_path = "raw" }

[command]
args = ["snu", "attachment-upload", "incident", "{{sys_id}}", "--file", "{{file_path}}", "--profile", "e2e-scenario", "--output", "json"]

[expect]
exit_code = 0

[[fuzzy]]
expectation = "The fixture is attached to the incident via the browser session; the response references the uploaded file name and the record's sys_id."

[[cleanup]]
description = "Delete the record via the browser session (cascades to attachments)"
args = ["snu", "delete-record", "incident", "--sys-id", "{{sys_id}}", "--profile", "e2e-scenario"]
allow_failure = true

[[cleanup]]
description = "Remove the local fixture file"
shell = "rm -f \"{{file_path}}\""
allow_failure = true

[[cleanup]]
description = "Remove the scenario profile"
args = ["profile", "remove", "e2e-scenario", "--yes"]
allow_failure = true
