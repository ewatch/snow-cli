name = "snu-wait-token"
description = "Wait for /token from SN-Utils and print the received browser session metadata"
requires = ["sn-utils-bridge", "credentials"]

[[setup]]
description = "Create the scenario profile (instance context; bridge provides the session)"
args = ["profile", "add", "e2e-scenario", "--instance", "$SNOW_E2E_INSTANCE_URL", "--auth-method", "basic", "--username", "$SNOW_E2E_USERNAME"]

[[setup]]
description = "Build the Chrome match pattern for the harness ServiceNow tab"
shell = '''base="$SNOW_E2E_INSTANCE_URL"; printf '%s/*' "${base%/}"'''
capture = { tab_url = "raw" }

[command]
shell = '''set -euo pipefail; out=$(mktemp "${TMPDIR:-/tmp}/snow-cli-e2e-wait-token-out.XXXXXX"); err=$(mktemp "${TMPDIR:-/tmp}/snow-cli-e2e-wait-token-err.XXXXXX"); waiter=""; cleanup_wait_token() { if [ -n "$waiter" ]; then kill "$waiter" 2>/dev/null || true; fi; rm -f "$out" "$err"; }; trap cleanup_wait_token EXIT; "$SNOW_CLI_BIN" snu wait-token --timeout-secs 30 --profile e2e-scenario --output json >"$out" 2>"$err" & waiter=$!; sleep 2; "$SNOW_CLI_BIN" snu slash /token --url "{{tab_url}}" --profile e2e-scenario --output json >/dev/null; wait "$waiter" || { status=$?; cat "$err" >&2; exit "$status"; }; waiter=""; cat "$out"'''

[expect]
exit_code = 0
json_field_present = [
  ".name | type == \"string\" and length > 0",
  ".url | type == \"string\" and startswith(\"https://\")",
  ".has_g_ck == true",
]

[[cleanup]]
description = "Remove the scenario profile"
args = ["profile", "remove", "e2e-scenario", "--yes"]
allow_failure = true
