name = "snu-update-record"
description = "Update fields on a record through the active SN-Utils browser session (snu CRUD: update)"
requires = ["sn-utils-bridge", "credentials"]

[[setup]]
description = "Create the scenario profile (instance context; bridge provides the session)"
args = ["profile", "add", "e2e-scenario", "--instance", "$SNOW_E2E_INSTANCE_URL", "--auth-method", "basic", "--username", "$SNOW_E2E_USERNAME"]

[[setup]]
description = "Create a record to update via the browser session"
args = ["snu", "create-record", "incident", "--data", "{\"short_description\":\"snow-cli e2e scenario: snu-update-record (before)\"}", "--profile", "e2e-scenario", "--output", "json"]
capture = { sys_id = ".sys_id | select(type == \"string\" and test(\"^[0-9a-f]{32}$\"))" }

[command]
args = ["snu", "update-record", "incident", "{{sys_id}}", "--field", "short_description", "--content", "snow-cli e2e scenario: snu-update-record (after)", "--await", "--profile", "e2e-scenario", "--output", "json"]

[expect]
exit_code = 0
json_field_present = [
  ".success == true",
  ".awaited == true",
  ".sys_id | type == \"string\" and test(\"^[0-9a-f]{32}$\")",
  ".fields == [\"short_description\"]",
  ".persisted.short_description == \"snow-cli e2e scenario: snu-update-record (after)\"",
  ".warnings | length == 0",
  ".response.success == true",
  ".response.updated == 1",
]

[[cleanup]]
description = "Delete the record via the browser session"
args = ["snu", "delete-record", "incident", "--sys-id", "{{sys_id}}", "--profile", "e2e-scenario"]
allow_failure = true

[[cleanup]]
description = "Remove the scenario profile"
args = ["profile", "remove", "e2e-scenario", "--yes"]
allow_failure = true
