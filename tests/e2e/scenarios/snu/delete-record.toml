name = "snu-delete-record"
description = "Delete a record through the active SN-Utils browser session (snu CRUD: delete)"
requires = ["sn-utils-bridge", "credentials"]

[[setup]]
description = "Create the scenario profile (instance context; bridge provides the session)"
args = ["profile", "add", "e2e-scenario", "--instance", "$SNOW_E2E_INSTANCE_URL", "--auth-method", "basic", "--username", "$SNOW_E2E_USERNAME"]

[[setup]]
description = "Create a throwaway record to delete via the browser session"
args = ["snu", "create-record", "incident", "--data", "{\"short_description\":\"snow-cli e2e scenario: snu-delete-record\"}", "--profile", "e2e-scenario", "--output", "json"]
capture = { sys_id = ".sys_id" }

[command]
args = ["snu", "delete-record", "incident", "--sys-id", "{{sys_id}}", "--profile", "e2e-scenario", "--output", "json"]

[expect]
exit_code = 0

[[fuzzy]]
expectation = "The record is deleted via the browser session; a subsequent snu get-record for the same sys_id returns nothing."

[[cleanup]]
description = "Best-effort re-delete in case the command step failed"
args = ["snu", "delete-record", "incident", "--sys-id", "{{sys_id}}", "--profile", "e2e-scenario"]
allow_failure = true

[[cleanup]]
description = "Remove the scenario profile"
args = ["profile", "remove", "e2e-scenario", "--yes"]
allow_failure = true
