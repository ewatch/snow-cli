name = "table-update"
description = "Update an existing record by sys_id (table CRUD: update leg)"
requires = ["credentials"]

[[setup]]
description = "Create the scenario profile"
args = ["profile", "add", "e2e-scenario", "--instance", "$SNOW_E2E_INSTANCE_URL", "--auth-method", "basic", "--username", "$SNOW_E2E_USERNAME"]

[[setup]]
description = "Store credentials for the scenario profile"
shell = "printf '%s' \"$SNOW_E2E_PASSWORD\" | \"$SNOW_CLI_BIN\" auth login --profile e2e-scenario --password-stdin"

[[setup]]
description = "Create a throwaway record to update"
args = ["table", "create", "incident", "--profile", "e2e-scenario", "--output", "json", "--data", "{\"short_description\":\"snow-cli e2e scenario: table-update (before)\"}"]
capture = { sys_id = ".sys_id" }

[command]
args = ["table", "update", "incident", "{{sys_id}}", "--profile", "e2e-scenario", "--output", "json", "--data", "{\"short_description\":\"snow-cli e2e scenario: table-update (after)\"}"]

[expect]
exit_code = 0
stdout_contains = ["sys_id", "table-update (after)"]
json_field_present = ['.sys_id']

[[fuzzy]]
expectation = "The record's short_description changes to '(after)' while sys_id stays the same."

[[cleanup]]
description = "Delete the record this scenario created"
args = ["table", "delete", "incident", "{{sys_id}}", "--profile", "e2e-scenario", "--yes"]
allow_failure = true

[[cleanup]]
description = "Remove the scenario profile"
args = ["profile", "remove", "e2e-scenario", "--yes"]
allow_failure = true
