name = "import-set-transform"
description = "Placeholder for the hidden, unimplemented `import-set transform` command"
requires = ["credentials", "unimplemented"]

# SKIPPED by default. `import-set transform` is a hidden, unimplemented CLI
# subcommand: POST /api/now/import/{table} (what `import-set load` calls) already
# runs the staging table's transform map automatically, so the transform is
# validated end to end by import-set/load.toml (it inserts the target incident
# during load). No separate REST transform trigger is wired into the CLI, so this
# command cannot succeed.
#
# This scenario is retained — tagged requires = ["unimplemented"] so the runner
# skips it — to reserve the coverage slot should a supported standalone transform
# trigger ever be implemented. To force-run it (it will fail, by design, until
# the command is implemented), set SNOW_E2E_INCLUDE_UNIMPLEMENTED=1.

[command]
args = ["import-set", "transform", "REPLACE_WITH_IMPORT_SET_SYS_ID", "--profile", "e2e-scenario", "--output", "json"]

[expect]
exit_code = 0

[[fuzzy]]
expectation = "If a standalone transform trigger is ever implemented, the staged import set is transformed and the result reports the target records created."
