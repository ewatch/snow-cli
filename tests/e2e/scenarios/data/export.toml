name = "data-export"
description = "Export records from a single table into a flat artifact (data: export leg)"
requires = ["credentials"]

[[setup]]
description = "Create the scenario profile"
args = ["profile", "add", "e2e-scenario", "--instance", "$SNOW_E2E_INSTANCE_URL", "--auth-method", "basic", "--username", "$SNOW_E2E_USERNAME"]

[[setup]]
description = "Store credentials for the scenario profile"
shell = "printf '%s' \"$SNOW_E2E_PASSWORD\" | \"$SNOW_CLI_BIN\" auth login --profile e2e-scenario --password-stdin"

[command]
args = ["data", "export", "incident", "--limit", "2", "--profile", "e2e-scenario", "--output", "json"]

[expect]
exit_code = 0
stdout_contains = ["table-export", "incident"]
json_field_present = ['.kind']

[[fuzzy]]
expectation = "The artifact has kind 'table-export' for table incident and carries at most 2 exported records."

[[cleanup]]
description = "Remove the scenario profile"
args = ["profile", "remove", "e2e-scenario", "--yes"]
allow_failure = true
